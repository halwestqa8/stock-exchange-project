name: Publish Staff Image

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-staff-image.yml
      - docker/staff.runtime.Dockerfile
      - packages/**
      - pj_staff/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: halwestqa8/stock-exchange-project-staff
  STAFF_BASE_URL: https://ltsmapi.45.32.155.226.sslip.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.2
          cache: true

      - name: Build staff web bundle
        working-directory: pj_staff
        run: |
          flutter --version
          flutter pub get
          flutter build web --release --dart-define=BASE_URL=${STAFF_BASE_URL}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: ./pj_staff/build/web
          file: docker/staff.runtime.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
